<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>login</title>
    <!-- Link Styles-->
    <link rel="stylesheet" href="css/login.css">

    <!-- favicon -->
    <link rel="shortcut icon" href="favicon-brasa.svg" type="image/svg+xml">

    <style>
        .fixed-icon {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 60px;
            height: 60px;
            background-color: #181818;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            font-size: 24px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
            cursor: pointer;
            z-index: 1000;
        }

        .fixed-icon:hover {
            background-color: #222831;
        }
    </style>
</head>

<body>
    <!-- FORM -->
    <div class="wrapper">
        <h2 class="title" style="color: rgb(29, 29, 29);">Área do Logista <ion-icon name="storefront-outline"></ion-icon></h2>
        <div class="logo">
            <img src="images/logo-brasa-login.png" alt="">
        </div>
        <div class="title">
            Painel de Controle
        </div>
        <form class="p-3 mt-3" method="post">
            <div class="form-field d-flex align-items-center">
                <span class="far fa-user"></span>
                <input type="text" name="username" id="userName" placeholder="Usuário" required>
            </div>
            <div class="form-field d-flex align-items-center">
                <span class="fas fa-key"></span>
                <input type="password" name="senha" id="pwd" placeholder="Senha" required>
            </div>
            <button type="submit" class="btn mt-3">Acessar Painel</button>
        </form>
        <div class="text-center fs-6">
            <br>
            <a href="#">Esqueceu sua Senha?</a>
        </div>
        <br>
        <p style="color: gray;">Página apenas para demostração de template.</p>
    </div>

    <!-- Icon FIXO Modal-->
    <a href="index.html"> <button class="fixed-icon">
            <ion-icon name="home-outline"></ion-icon>
        </button></a>

    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>
</body>

</html>
