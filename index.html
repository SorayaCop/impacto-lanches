            color: #fff;

            font-size: 13px;
            font-weight: 800;

        { id: 27, category: 'bebidas', name: 'Antártica Latão', price: 8.00, description: 'Cerveja Antártica latão.' },
        { id: 28, category: 'bebidas', name: 'Brahma Latão', price: 8.00, description: 'Cerveja Brahma latão.' },
        { id: 29, category: 'bebidas', name: 'Coca-Cola Lata', price: 8.00, description: 'Coca-Cola lata.' },
        { id: 30, category: 'bebidas', name: 'Coca-Cola Zero Lata', price: 8.00, description: 'Coca-Cola Zero lata.' },
        { id: 31, category: 'bebidas', name: 'Guaravita', price: 3.00, description: 'Guaravita.' },
        { id: 32, category: 'bebidas', name: 'Água sem Gás', price: 3.00, description: 'Água mineral sem gás.' },
        { id: 33, category: 'bebidas', name: 'Água com Gás', price: 4.00, description: 'Água mineral com gás.' },

        // DRINKS
        { id: 34, category: 'drinks', name: 'Caipirinha 400 ml', price: 15.00, description: 'Drink de 400 ml.' },
        { id: 35, category: 'drinks', name: 'Caipiroska 400 ml', price: 15.00, description: 'Drink de 400 ml.' },
        { id: 36, category: 'drinks', name: 'Caipiríssima 400 ml', price: 15.00, description: 'Drink de 400 ml.' },
        { id: 37, category: 'drinks', name: 'Campari com Laranja (dose)', price: 15.00, description: 'Campari com laranja — dose.' },
        { id: 38, category: 'drinks', name: 'Camparida 400 ml', price: 19.50, description: 'Drink de 400 ml.' }
    ];

    const CATEGORY_NAMES = {
        lanches: 'Lanches',
        porcoes: 'Porções',
        caldos: 'Caldo',
        bebidas: 'Bebidas',
        drinks: 'Drinks (400 ml)'
    };

    let cart = loadCart();

    function formatCurrency(value) {
        return value.toLocaleString('pt-BR', {
            style: 'currency',
            currency: 'BRL'
        });
    }

    function loadCart() {
        try {
            const saved = localStorage.getItem('impacto_cart');
            return saved ? JSON.parse(saved) : [];
        } catch (error) {
            return [];
        }
    }

    function saveCart() {
        localStorage.setItem('impacto_cart', JSON.stringify(cart));
    }

    function renderProducts(filter = 'todos') {
        const grid = document.getElementById('products-grid');
        grid.innerHTML = '';

        Object.keys(CATEGORY_NAMES).forEach(category => {
            if (filter !== 'todos' && filter !== category) return;

            const categoryProducts = PRODUCTS.filter(product => product.category === category);
            if (!categoryProducts.length) return;

            const title = document.createElement('div');
            title.className = 'category-title';
            title.textContent = CATEGORY_NAMES[category];
            grid.appendChild(title);

            categoryProducts.forEach(product => {
                const column = document.createElement('div');
                column.className = `col-sm-6 col-lg-4 product-column ${product.category}`;

                column.innerHTML = `
                    <div class="box" data-id="${product.id}">
                        <div class="detail-box">
                            <h5>${product.name}</h5>
                            <p>${product.description}</p>
                            <div class="options">
                                <h4>${formatCurrency(product.price)}</h4>
                                <button type="button" class="btn-cart" data-product-id="${product.id}">
                                    Adicionar <i class="fa-solid fa-cart-plus"></i>
                                </button>
                            </div>
                        </div>
                    </div>
                `;

                grid.appendChild(column);
            });
        });
    }

    function addToCart(productId) {
        const product = PRODUCTS.find(item => item.id === productId);
        if (!product) return;

        const existing = cart.find(item => item.id === productId);
        if (existing) {
            existing.quantity += 1;
        } else {
            cart.push({
                id: product.id,
                name: product.name,
                price: product.price,
                quantity: 1
            });
        }

        saveCart();
        updateCartUI();
        showSuccessMessage();
    }

    function changeQuantity(productId, change) {
        const item = cart.find(cartItem => cartItem.id === productId);
        if (!item) return;

        item.quantity += change;

        if (item.quantity <= 0) {
            cart = cart.filter(cartItem => cartItem.id !== productId);
        }

        saveCart();
        updateCartUI();
    }

    function removeFromCart(productId) {
        cart = cart.filter(item => item.id !== productId);
        saveCart();
        updateCartUI();
    }

    function getItemsSubtotal() {
        return cart.reduce((total, item) => total + (item.price * item.quantity), 0);
    }

    function getDeliveryFee() {
        const orderType = document.getElementById('inputOrderType').value;
        if (orderType === 'retirada') return 0;

        const neighborhoodSelect = document.getElementById('inputNeighborhood');
        const selectedOption = neighborhoodSelect.options[neighborhoodSelect.selectedIndex];
        return Number(selectedOption?.dataset?.frete || 0);
    }

    function updateTotals() {
        const subtotal = getItemsSubtotal();
        const delivery = getDeliveryFee();
        const finalTotal = subtotal + delivery;

        document.getElementById('delivery-value').textContent = formatCurrency(delivery);
        document.getElementById('total-value').textContent = formatCurrency(subtotal);
        document.getElementById('final-total-value').textContent = formatCurrency(finalTotal);
    }

    function updateCartUI() {
        const list = document.getElementById('cart-items-list');
        const count = cart.reduce((total, item) => total + item.quantity, 0);

        document.getElementById('header-cart-count').textContent = count;
        document.getElementById('fixed-cart-count').textContent = count;

        if (!cart.length) {
            list.innerHTML = '<li class="empty-cart">Seu pedido ainda está vazio.</li>';
            updateTotals();
            return;
        }

        list.innerHTML = cart.map(item => `
            <li class="cart-item">
                <div>
                    <div class="cart-item-name">${item.name}</div>
                    <div class="cart-item-price">
                        ${formatCurrency(item.price)} cada • Subtotal: ${formatCurrency(item.price * item.quantity)}
                    </div>
                </div>
                <div class="cart-item-actions">
                    <button type="button" class="qty-btn" data-action="decrease" data-id="${item.id}">−</button>
                    <span class="cart-qty">${item.quantity}</span>
                    <button type="button" class="qty-btn" data-action="increase" data-id="${item.id}">+</button>
                    <button type="button" class="remove-btn" data-action="remove" data-id="${item.id}" title="Remover">
                        <i class="fa-solid fa-trash"></i>
                    </button>
                </div>
            </li>
        `).join('');

        updateTotals();
    }

    function toggleDeliveryFields() {
        const orderType = document.getElementById('inputOrderType').value;
        const isDelivery = orderType === 'entrega';

        document.getElementById('neighborhood-row').style.display = isDelivery ? 'flex' : 'none';
        document.getElementById('address-row').style.display = isDelivery ? 'flex' : 'none';

        if (!isDelivery) {
            document.getElementById('inputNeighborhood').value = '';
            document.getElementById('inputAddress').value = '';
            document.getElementById('inputZip').value = '';
        }

        updateTotals();
    }

    function validateOrder() {
        const orderType = document.getElementById('inputOrderType').value;
        const name = document.getElementById('inputName').value.trim();
        const payment = document.getElementById('inputState').value;

        if (!cart.length) {
            alert('Adicione pelo menos um produto ao pedido.');
            return false;
        }

        if (!name) {
            alert('Informe seu nome.');
            document.getElementById('inputName').focus();
            return false;
        }

        if (orderType === 'entrega') {
            const neighborhood = document.getElementById('inputNeighborhood').value;
            const address = document.getElementById('inputAddress').value.trim();

            if (!neighborhood) {
                alert('Selecione o bairro para calcular o frete.');
                document.getElementById('inputNeighborhood').focus();
                return false;
            }

            if (!address) {
                alert('Informe o endereço de entrega.');
                document.getElementById('inputAddress').focus();
                return false;
            }
        }

        if (!payment) {
            alert('Selecione a forma de pagamento.');
            document.getElementById('inputState').focus();
            return false;
        }

        return true;
    }

    function sendWhatsAppOrder() {
        if (!validateOrder()) return;

        const orderType = document.getElementById('inputOrderType').value;
        const name = document.getElementById('inputName').value.trim();
        const neighborhood = document.getElementById('inputNeighborhood').value;
        const address = document.getElementById('inputAddress').value.trim();
        const zip = document.getElementById('inputZip').value.trim();
        const payment = document.getElementById('inputState').value;
        const observations = document.getElementById('inputAddress2').value.trim();

        const subtotal = getItemsSubtotal();
        const delivery = getDeliveryFee();
        const finalTotal = subtotal + delivery;

        const itemsText = cart.map(item =>
            `• ${item.quantity}x ${item.name} — ${formatCurrency(item.price * item.quantity)}`
        ).join('\n');

        const deliveryText = orderType === 'entrega'
            ? `*Tipo:* Entrega\n*Bairro:* ${neighborhood}\n*Endereço:* ${address}${zip ? `\n*CEP:* ${zip}` : ''}`
            : '*Tipo:* Retirada na loja';

        const message = [
            '*NOVO PEDIDO — IMPACTO LANCHES*',
            '',
            `*Cliente:* ${name}`,
            deliveryText,
            `*Pagamento:* ${payment}`,
            '',
            '*ITENS:*',
            itemsText,
            '',
            `*Total dos itens:* ${formatCurrency(subtotal)}`,
            `*Frete:* ${delivery === 0 ? 'GRÁTIS / R$ 0,00' : formatCurrency(delivery)}`,
            `*TOTAL DO PEDIDO:* ${formatCurrency(finalTotal)}`,
            observations ? `\n*Observações:* ${observations}` : ''
        ].filter(Boolean).join('\n');

        const url = `https://wa.me/${WHATSAPP_NUMBER}?text=${encodeURIComponent(message)}`;
        window.open(url, '_blank');
    }

    function showSuccessMessage() {
        const message = document.getElementById('successMessage');
        message.style.display = 'block';
        clearTimeout(window.successMessageTimeout);
        window.successMessageTimeout = setTimeout(() => {
            message.style.display = 'none';
        }, 1600);
    }

    document.addEventListener('click', event => {
        const cartButton = event.target.closest('.btn-cart');
        if (cartButton) {
            addToCart(Number(cartButton.dataset.productId));
            return;
        }

        const cartAction = event.target.closest('[data-action]');
        if (cartAction) {
            const id = Number(cartAction.dataset.id);
            const action = cartAction.dataset.action;

            if (action === 'increase') changeQuantity(id, 1);
            if (action === 'decrease') changeQuantity(id, -1);
            if (action === 'remove') removeFromCart(id);
            return;
        }

        const filterButton = event.target.closest('.filter-button');
        if (filterButton) {
            document.querySelectorAll('.filter-button').forEach(button => button.classList.remove('active'));
            filterButton.classList.add('active');
            renderProducts(filterButton.dataset.filter);
        }
    });

    document.getElementById('inputOrderType').addEventListener('change', toggleDeliveryFields);
    document.getElementById('inputNeighborhood').addEventListener('change', updateTotals);

    document.getElementById('current-year').textContent = new Date().getFullYear();

    renderProducts();
    toggleDeliveryFields();
    updateCartUI();
</script>
</body>
</html>
